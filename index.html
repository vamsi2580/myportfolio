<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Buttons Example</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="button-container">
            <button class="fixed-button">Button 1</button>
            <button class="fixed-button" style="display: inline-block;
                padding: 14px 23px;
                font-size: 16px;
                color: #fff;
                background-color: #098cc4;
                text-align: center;
                text-decoration: none;
                border-radius: 5px;
                "
    
            >Button 2</button>
        </div>
    </div>
</body>
</html>
