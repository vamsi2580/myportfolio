    <style>
   
   html{

   }

     body  {
        
        background-image: url("22.jpg");
      height: 100%;

      background-size: cover;

      nav{
        text-align: center;

         transition-property: 50;

         color: #fff;
      }
      
      nav a img{
      height: 30px;
       position: absolute ; top: 50
       px; right: 30px;
       
      
      }
      nav img:hover{
        opacity: 0.4;
        transition: opacity 0.5s ease-in-out;
      
      }
      nav a{
        padding: 14px 20px;
        text-underline-offset: 0;
        color: aliceblue;
        font-size: 18px;
        
        border-radius: 5px;
        text-decoration: none;
      
      }
      nav a:hover {
            background-color: #f7f3f3;
            color: black;
        }
        .search-button { 
          padding: 10px 15px;
           background-color: #007BFF;
            color: white;
             border: none; 
             border-radius: 5px;
              cursor: pointer;
               font-size: 16px;
                margin-left: 10px;
               }
 
    </style>
